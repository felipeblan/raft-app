<div class="border border-gray-200 bg-white rounded-xl p-6 shadow-sm">
  <h3 class="text-sm font-semibold mb-4 flex items-center gap-2">
    <svg class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="1" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 10h18"/></svg>
    Wallet Sweep
  </h3>
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
      <div class="text-xs text-gray-500 mb-1">Cold (long-term)</div>
      <div class="text-lg font-semibold sensitive-data">
        {{ store.displayColdBtc() }}
      </div>
    </div>
    <div class="bg-orange-50/50 p-3 rounded-lg border border-orange-100">
      <div class="text-xs text-orange-600 mb-1">Liquid (exchange)</div>
      <div class="text-lg font-semibold sensitive-data text-orange-700">
        {{ store.displayLiquidBtc() }}
      </div>
    </div>
    <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
      <div class="text-xs text-gray-500 mb-1">Mobile (spending)</div>
      <div class="text-lg font-semibold sensitive-data">
        {{ store.displayMobileBtc() }}
      </div>
    </div>
  </div>
  <div class="mt-4 text-sm text-gray-700">
    <p class="text-xs text-gray-400 mt-2">Moving to cold storage costs ~<span class="font-mono text-gray-500">
      @if (bitcoinService.mempoolFee()) {
        {{ bitcoinService.mempoolFee() }} sats/vB
      } @else {
        pending api...
      }
    </span> now.</p>
  </div>
</div>
